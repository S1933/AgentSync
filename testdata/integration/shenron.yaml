version: "1"
agents:
  - id: build
    description: "Build and deploy agent"
    mode: primary
    model: anthropic/claude-sonnet-4-5
    temperature: 0.7
    skills: [test-driven-development]
    systemPrompt: |
      You are a build agent responsible for CI/CD tasks.
    permissions:
      read: allow
      edit: ask
      bash:
        "go *": allow
        "npm *": allow
      webfetch: deny
      websearch: ask
      tasks:
        review: allow
    extensions:
      opencode:
        steps: 50
        permission:
          glob: allow
          grep: allow
          list: allow
          lsp: deny
  - id: review
    description: "Code review sub-agent"
    mode: subagent
    promptFile: prompts/review.md
    permissions:
      read: allow
      edit: deny
  - id: scan
    description: "Security scan agent"
    mode: primary
    systemPrompt: |
      You perform automated security scans.
commands:
  - id: ship
    description: "Ship current changes"
    template: |
      Review and ship the current changes.
    agent: build
  - id: lint
    description: "Run lint checks"
    template: |
      Run lint checks on the codebase.
